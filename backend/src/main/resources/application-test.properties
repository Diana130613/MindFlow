spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
# data.sql содержит PostgreSQL-специфичный синтаксис (ON CONFLICT) — отключаем в тестах
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false
app.jwt.secret=test-secret-key-for-testing-purposes-only-must-be-256-bits-long!
app.jwt.access-token-expiration=900000
app.jwt.refresh-token-expiration=604800000